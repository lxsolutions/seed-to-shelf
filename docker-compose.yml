
version: '3.8'

services:
  traceability-db:
    image: postgres:15
    environment:
      POSTGRES_DB: traceability
      POSTGRES_USER: s2s
      POSTGRES_PASSWORD: s2s_password
    ports:
      - "5432:5432"
    volumes:
      - traceability-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s2s -d traceability"]
      interval: 10s
      timeout: 5s
      retries: 5

  traceability:
    build: ./services/traceability
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://s2s:s2s_password@traceability-db:5432/traceability
    depends_on:
      traceability-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  traceability-data:
